# Prometheus scrape configuration — Phase 10 platform observability.
#
# Mounted read-only into the prometheus container at /etc/prometheus/prometheus.yml.
# Targets use Docker Compose service names (resolved on the `platform` network).
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: industrial-iot

# Alerting rules (latency SLA, Kafka lag, drift). Loaded from the same config dir.
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus scraping itself — baseline liveness.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI model-serving API (Phase 9) — request volume, latency, prediction scores.
  - job_name: serving
    metrics_path: /metrics
    static_configs:
      - targets: ["serving:8000"]
        labels:
          component: model-serving

  # Optional exporters — uncomment once deployed.
  # - job_name: kafka
  #   static_configs:
  #     - targets: ["kafka-exporter:9308"]
  # - job_name: node
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
  # - job_name: pushgateway   # Spark batch/streaming metrics pushed here.
  #   honor_labels: true
  #   static_configs:
  #     - targets: ["pushgateway:9091"]
