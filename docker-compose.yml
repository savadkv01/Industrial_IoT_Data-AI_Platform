  #     - ./orchestration/dags:/opt/airflow/dags
  #   networks: [platform]

  # ────────────── Query engine ──────────────
  # trino:
  #   image: trinodb/trino:latest
  #   container_name: trino
  #   ports: ["8082:8080"]
  #   networks: [platform]

  # ────────────── Model serving ──────────────
  # serving:
  #   build: ./serving
