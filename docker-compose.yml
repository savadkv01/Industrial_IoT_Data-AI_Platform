# =====================================================================
# Industrial IoT — Data & AI Platform
# Local, on-premise platform skeleton. Bring up incrementally per phase.
#   docker compose up -d kafka minio postgres        # Phase 3-4 core
#   docker compose up -d mlflow airflow              # Phase 5-7
#   docker compose up -d serving prometheus grafana  # Phase 9-10
# =====================================================================
name: industrial-iot-ai-platform

services:
  # ────────────── Ingestion ──────────────
  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    ports:
      - "9092:9092"   # internal listener (advertised as kafka:9092)
      - "9094:9094"   # host listener (advertised as localhost:9094)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks: [platform]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on: [kafka]
    networks: [platform]

  # ────────────── Object storage (S3) ──────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [platform]

  # ────────────── Lakehouse bucket bootstrap ──────────────
  createbuckets:
    image: minio/mc:latest
    container_name: createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${S3_BUCKET_LAKEHOUSE:-lakehouse};
      mc anonymous set public local/${S3_BUCKET_LAKEHOUSE:-lakehouse};
      mc mb --ignore-existing local/${S3_BUCKET_MLFLOW:-mlflow};
      echo 'lakehouse + mlflow buckets ready';
      exit 0;
      "
    networks: [platform]

  # ────────────── Metadata DB ──────────────
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-metadata}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Creates the mlflow + airflow databases on first boot (Phase 7).
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [platform]

  # ────────────── Stream processing (Phase 3) ──────────────
  spark-streaming:
    build: ./infra/docker/spark
    image: iiot/spark:3.5.1
    container_name: spark-streaming
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      # In-network address is fixed (not host-overridable) so the broker is always reachable.
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TELEMETRY_TOPIC: ${KAFKA_TELEMETRY_TOPIC:-iot.telemetry}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_LAKEHOUSE: ${S3_BUCKET_LAKEHOUSE:-lakehouse}
    volumes:
      - ./streaming:/opt/app/streaming
      - ivy-cache:/opt/spark/.ivy2
    command: ["bash", "/opt/app/streaming/spark/submit_ingest.sh"]
    networks: [platform]

  spark-alerting:
    build: ./infra/docker/spark
    image: iiot/spark:3.5.1
    container_name: spark-alerting
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TELEMETRY_TOPIC: ${KAFKA_TELEMETRY_TOPIC:-iot.telemetry}
      KAFKA_ALERTS_TOPIC: ${KAFKA_ALERTS_TOPIC:-iot.alerts}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_LAKEHOUSE: ${S3_BUCKET_LAKEHOUSE:-lakehouse}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      ANOMALY_MODEL_ALIAS: ${ANOMALY_MODEL_ALIAS:-production}
      ANOMALY_ALERT_THRESHOLD: ${ANOMALY_ALERT_THRESHOLD:-0.5}
      ALERTS_TRIGGER_INTERVAL: ${ALERTS_TRIGGER_INTERVAL:-10 seconds}
      ALERTS_COOLDOWN: ${ALERTS_COOLDOWN:-60 seconds}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./streaming:/opt/app/streaming
      - ./ml:/opt/app/ml
      - ivy-cache:/opt/spark/.ivy2
    command: ["bash", "/opt/app/streaming/spark/submit_alerts.sh"]
    networks: [platform]

  # ────────────── Lakehouse batch jobs (Phase 4) ──────────────
  # Run manually: docker compose run --rm spark-silver
  # or:           docker compose run --rm spark-gold
  spark-silver:
    build: ./infra/docker/spark
    image: iiot/spark:3.5.1
    container_name: spark-silver
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_LAKEHOUSE: ${S3_BUCKET_LAKEHOUSE:-lakehouse}
      DQ_MAX_NULL_RATE: ${DQ_MAX_NULL_RATE:-0.05}
      DQ_MAX_RANGE_VIOLATION_RATE: ${DQ_MAX_RANGE_VIOLATION_RATE:-0.01}
      SPARK_SHUFFLE_PARTITIONS: ${SPARK_SHUFFLE_PARTITIONS:-8}
    volumes:
      - ./lakehouse:/opt/app/lakehouse
      - ./streaming:/opt/app/streaming
      - ivy-cache:/opt/spark/.ivy2
    command: ["bash", "/opt/app/lakehouse/silver/submit_silver.sh"]
    networks: [platform]

  spark-gold:
    build: ./infra/docker/spark
    image: iiot/spark:3.5.1
    container_name: spark-gold
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_LAKEHOUSE: ${S3_BUCKET_LAKEHOUSE:-lakehouse}
      SPARK_SHUFFLE_PARTITIONS: ${SPARK_SHUFFLE_PARTITIONS:-8}
    volumes:
      - ./lakehouse:/opt/app/lakehouse
      - ./streaming:/opt/app/streaming
      - ivy-cache:/opt/spark/.ivy2
    command: ["bash", "/opt/app/lakehouse/gold/submit_gold.sh"]
    networks: [platform]

  # ────────────── Experiment tracking (Phase 7) ──────────────
  mlflow:
    build: ./infra/docker/mlflow
    image: iiot/mlflow:3.14.0
    container_name: mlflow
    ports: ["5000:5000"]
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${MLFLOW_DB:-mlflow}
      MLFLOW_ARTIFACTS_DESTINATION: s3://${S3_BUCKET_MLFLOW:-mlflow}/
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [platform]

  # ────────────── Orchestration (Phase 7) ──────────────
  # Single-node Airflow (LocalExecutor) running the ML retraining DAG.
  # Bring up with:  docker compose up -d airflow
  airflow:
    build: ./infra/docker/airflow
    image: iiot/airflow:2.9.3
    container_name: airflow
    ports: ["8081:8080"]
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES:-False}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${AIRFLOW_DB:-airflow}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      ML_OFFLINE_FEATURES: /opt/airflow/ml_src/feature-engineering/data/offline/telemetry_features.parquet
    depends_on:
      postgres:
        condition: service_started
      mlflow:
        condition: service_started
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./ml:/opt/airflow/ml_src/ml:ro
      - ./feature-engineering:/opt/airflow/ml_src/feature-engineering:ro
    command: ["bash", "-c", "airflow db migrate && (airflow users create --username admin --password admin --firstname a --lastname b --role Admin --email admin@example.com || true) && airflow scheduler & exec airflow webserver"]
    networks: [platform]

  # ────────────── Query engine ──────────────
