# =====================================================================
# Industrial IoT — Data & AI Platform
# Local, on-premise platform skeleton. Bring up incrementally per phase.
#   docker compose up -d kafka minio postgres        # Phase 3-4 core
#   docker compose up -d mlflow airflow              # Phase 5-7
#   docker compose up -d serving prometheus grafana  # Phase 9-10
# =====================================================================
name: industrial-iot-ai-platform

services:
  # ────────────── Ingestion ──────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/bitnami/kafka
    networks: [platform]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on: [kafka]
    networks: [platform]

  # ────────────── Object storage (S3) ──────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks: [platform]

  # ────────────── Metadata DB ──────────────
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-metadata}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [platform]

  # ────────────── Experiment tracking ──────────────
  # mlflow:
  #   build: ./infra/docker/mlflow
  #   container_name: mlflow
  #   ports: ["5000:5000"]
  #   depends_on: [postgres, minio]
  #   networks: [platform]

  # ────────────── Orchestration ──────────────
  # airflow:
  #   build: ./infra/docker/airflow
