  #   ports: ["9090:9090"]
  #   volumes:
  #     - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
  #   networks: [platform]

  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: grafana
  #   ports: ["3000:3000"]
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   networks: [platform]

volumes:
  minio-data:
  postgres-data:
  grafana-data:
  ivy-cache:

networks:
  platform:
    driver: bridge
